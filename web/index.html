<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MAA Web Control</title>
    <link rel="icon" href="/newlogo.ico" />
    <link rel="stylesheet" href="/styles/base.css" />
    <link rel="stylesheet" href="/styles/layout.css" />
    <link rel="stylesheet" href="/styles/basement.css" />
    <link rel="stylesheet" href="/styles/logs.css" />
    <link rel="stylesheet" href="/styles/forms.css" />
    <link rel="stylesheet" href="/styles/tools.css" />
    <link rel="stylesheet" href="/styles/copilot.css" />
    <link rel="stylesheet" href="/styles/settings.css" />
  </head>
  <body>
    <div class="windowShell">
      <header class="titlebar">
        <div class="windowTitle">
          <img class="appIcon" src="/newlogo.ico" alt="" />
          <span>MAA Web - v0.1.0 - redroid - 官服</span>
        </div>
        <div class="windowTools">
          <button id="refreshButton" type="button" title="刷新">⟳</button>
          <span>─</span>
          <span>□</span>
          <span>×</span>
        </div>
      </header>

      <nav class="mainNav" aria-label="主导航"></nav>

      <main class="content">
        <section id="view-basement" class="view active">
          <div class="maaLayout">
            <aside class="taskColumn">
              <div class="taskBox">
                <div id="taskList" class="taskList"></div>
                <div class="taskButtons">
                  <button id="addTaskButton" type="button">＋</button>
                  <button id="moveUpButton" type="button">全选</button>
                  <button id="deleteTaskButton" type="button">清空</button>
                </div>
              </div>
              <div class="afterRun">
                <span>完成后</span>
                <strong>无动作</strong>
              </div>
              <button id="runButton" type="button" class="linkStart">Link Start!</button>
              <button id="stopButton" type="button" class="linkStart stopStart ghost">停止</button>
            </aside>

            <section class="settingsArea">
              <div id="taskEditor" class="taskEditor empty">请选择一个任务</div>
              <div class="modeTabs">
                <button class="active" type="button" data-setting-mode="general">常规设置</button>
                <button type="button" data-setting-mode="advanced">高级设置</button>
              </div>
              <div class="tipsBlock" id="stageTipsBlock"></div>
            </section>

            <aside class="eventColumn" aria-label="事件日志">
              <div class="miniStatus">
                <div><span>状态</span><strong id="runnerState">Idle</strong></div>
                <div><span>任务</span><strong id="taskProgress">0 / 0</strong></div>
                <div><span>ADB</span><strong id="adbStatus">未配置</strong></div>
              </div>
              <div class="eventPanel">
                <div class="panelHead">
                  <span>执行日志</span>
                  <button id="clearLogsButton" type="button">清空</button>
                </div>
                <div id="logList" class="logList"></div>
              </div>
              <div class="eventPanel rawLogPanel">
                <div class="panelHead">
                  <span>运行日志</span>
                  <button id="rawLogToggle" type="button" class="rawLogToggleBtn">展开</button>
                </div>
                <div id="rawLogList" class="logList rawLogList" hidden></div>
              </div>
            </aside>
          </div>
        </section>

        <section id="view-copilot" class="view">
          <div id="copilotViewRoot" class="copilotViewRoot"></div>
        </section>

        <section id="view-tools" class="view">
          <div id="toolsViewRoot" class="toolsViewRoot"></div>
        </section>

        <section id="view-settings" class="view">
          <div id="settingsViewRoot" class="settingsViewRoot"></div>
        </section>
      </main>
    </div>

    <!-- Core infrastructure -->
    <script src="/core/storage.js"></script>
    <script src="/core/featureRegistry.js"></script>
    <script src="/core/state.js"></script>
    <script src="/core/api.js"></script>

    <!-- Shared utilities -->
    <script src="/shared/logCards.js"></script>
    <script src="/shared/logEvents.js"></script>

    <!-- Task type forms (index first for shared helpers, then per-type) -->
    <script src="/tasks/index.js"></script>
    <script src="/tasks/startup.js"></script>
    <script src="/tasks/fight.js"></script>
    <script src="/tasks/recruit.js"></script>
    <script src="/tasks/infrast.js"></script>
    <script src="/tasks/mall.js"></script>
    <script src="/tasks/award.js"></script>
    <script src="/tasks/custom.js"></script>
    <script src="/tasks/roguelike.js"></script>
    <script src="/tasks/reclamation.js"></script>
    <script src="/tasks/userdata.js"></script>

    <!-- Basement view (一键长草) -->
    <script src="/views/basement/profiles.js"></script>
    <script src="/views/basement/taskList.js"></script>
    <script src="/views/basement/taskEditor.js"></script>
    <script src="/views/basement/postAction.js"></script>
    <script src="/views/basement/runner.js"></script>
    <script src="/views/basement/stageTips.js"></script>
    <script src="/views/basement/index.js"></script>

    <!-- Copilot view -->
    <script src="/views/copilot/index.js"></script>

    <!-- Tools view -->
    <script src="/views/tools/index.js"></script>

    <!-- Settings view (helpers must load before state.js, sections any order, index last) -->
    <script src="/views/settings/helpers.js"></script>
    <script src="/views/settings/state.js"></script>
    <script src="/views/settings/profileSync.js"></script>
    <script src="/views/settings/scroll.js"></script>
    <script src="/views/settings/scheduler.js"></script>
    <script src="/views/settings/events.js"></script>
    <script src="/views/settings/sections/config.js"></script>
    <script src="/views/settings/sections/timer.js"></script>
    <script src="/views/settings/sections/game.js"></script>
    <script src="/views/settings/sections/performance.js"></script>
    <script src="/views/settings/sections/connection.js"></script>
    <script src="/views/settings/sections/maacore.js"></script>
    <script src="/views/settings/sections/startup.js"></script>
    <script src="/views/settings/sections/ui.js"></script>
    <script src="/views/settings/sections/background.js"></script>
    <script src="/views/settings/sections/remote.js"></script>
    <script src="/views/settings/sections/notification.js"></script>
    <script src="/views/settings/sections/update.js"></script>
    <script src="/views/settings/sections/issue.js"></script>
    <script src="/views/settings/sections/about.js"></script>
    <script src="/views/settings/index.js"></script>

    <!-- Boot last: wires everything and calls boot() -->
    <script src="/core/boot.js"></script>
  </body>
</html>
